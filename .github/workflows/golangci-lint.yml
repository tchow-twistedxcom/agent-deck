name: golangci-lint
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }
permissions:
  contents: read
  pull-requests: read
jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with: { go-version: '1.25.10' }
      # Bumped v6 → v9 in #1054 alongside the Go 1.25.10 toolchain bump: the
      # v6-era cached golangci-lint binary (v1.64.8) was built with Go 1.24,
      # which refuses to lint a go.mod targeting 1.25. v9 pulls v2.x binaries
      # built with Go 1.25+. .golangci.yml was migrated to v2 schema.
      # Still warn-only — flip to strict after baseline gosec findings are
      # triaged in follow-up PR.
      - uses: golangci/golangci-lint-action@v9
        with: { version: latest, args: --timeout=5m --issues-exit-code=0 }
